<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tab Menu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      color: #202124;
      padding: 32px;
    }

    #__menu_extension_root__ {
      max-width: 760px;
      margin: 0 auto;
    }

    #__menu_extension_root__ h1 {
      font-size: 14px;
      font-weight: 500;
      color: #5f6368;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }

    #__menu_extension_root__ ul {
      list-style: none;
    }

    #__menu_extension_root__ li {
      border-radius: 8px;
      margin-bottom: 2px;
    }

    #__menu_extension_root__ li:hover {
      background: #e8f0fe;
    }

    .tab-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .tab-info {
      min-width: 0;
      flex: 1;
    }

    .tab-title {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1a73e8;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-title:hover {
      text-decoration: underline;
    }

    .tab-url {
      font-size: 12px;
      color: #80868b;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="__menu_extension_root__">Loading...</div>
</body>
</html>
